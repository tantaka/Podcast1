name: Daily Podcast Generation

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      date_override:
        description: "Target date (YYYY-MM-DD, leave empty for yesterday)"
        required: false
        default: ""

jobs:
  generate-podcast:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Check ffmpeg
        run: ffmpeg -version | head -1

      - name: Run podcast pipeline
        working-directory: src
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          DATE_ARG="${{ github.event.inputs.date_override }}"
          if [ -n "$DATE_ARG" ]; then
            python pipeline.py "$DATE_ARG"
          else
            python pipeline.py
          fi

      - name: Save artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: podcast-output-${{ github.run_id }}
          path: |
            output/topic.json
            output/research.json
            output/script.txt
            output/script.json
            output/*.mp3
          retention-days: 7
          if-no-files-found: ignore

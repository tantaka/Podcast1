name: Daily Podcast Generation

on:
  schedule:
    # 毎日 JST 10:00 (UTC 01:00) に実行
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      date_override:
        description: "対象日付 (YYYY-MM-DD, 省略時は前日)"
        required: false
        default: ""

jobs:
  generate-podcast:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.12 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: ffmpeg の確認
        run: ffmpeg -version | head -1

      - name: Podcast パイプラインを実行
        working-directory: src
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          DATE_ARG="${{ github.event.inputs.date_override }}"
          if [ -n "$DATE_ARG" ]; then
            echo "指定日付: $DATE_ARG"
            python pipeline.py "$DATE_ARG"
          else
            echo "自動実行 (前日)"
            python pipeline.py
          fi

      - name: 成果物をアーティファクトとして保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: podcast-output-${{ github.run_id }}
          path: |
            output/topic.json
            output/research.json
            output/script.txt
            output/script.json
            output/*.mp3
          retention-days: 7
          if-no-files-found: ignore
